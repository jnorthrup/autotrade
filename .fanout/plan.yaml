stories:
- acceptance:
  - A signed-off list of hot-path computations is scoped for WASM and excluded from
    object-heavy orchestration code
  - The call boundary defines inputs, outputs, batching shape, state handoff, error
    semantics, and fallback behavior
  - The integration seam makes JS responsible for orchestration only and the numeric
    core responsible for all precision-sensitive math
  dependencies: []
  description: Define the exact boundary where Dreamer hands off compute to the WASM
    layer so the integration is stable instead of ad hoc. Identify the indicator/feature
    transforms, batching units, state inputs, outputs, ownership of buffers, and the
    points where JS must stop touching hot-path math.
  id: '001'
  name: Isolate the numeric seam from Dreamer orchestration
- acceptance:
  - Memory layout is documented for all input, output, and scratch buffers using structure-of-arrays
    and double-width storage
  - JSON serialization/deserialization rules preserve exact 64-bit values for all
    supported payloads, including edge cases such as NaN payload policy, infinities,
    signed zero, and extremal doubles
  - The contract states where binary transport is mandatory versus where JSON is allowed,
    with no ambiguous precision downgrade points
  dependencies:
  - '001'
  description: Design the low-level contract for double-precision data across the
    WASM boundary and any JSON-facing boundary. Cover contiguous Float64 layouts,
    vector lane alignment, ring/scratch buffers, and a JSON representation that preserves
    full 64-bit fidelity without relying on lossy JS numeric formatting.
  id: '002'
  name: Specify the f64 memory model and lossless wire contract
- acceptance:
  - Core kernels compile to WebAssembly with SIMD enabled and operate entirely on
    double-precision buffers in the hot path
  - Reference tests confirm deterministic IEEE-754-conformant results against a scalar
    double baseline for the targeted transforms
  - The kernel interface matches the agreed memory contract exactly, with no JS-side
    reshaping required inside compute loops
  dependencies:
  - '002'
  description: Implement the precision kernel as a dedicated WASM module whose hot
    loops operate on f64 vectors and keep the two degrees of contact inside the native
    numeric path. The kernel must be structured for SIMD-friendly compilation and
    deterministic double-precision behavior.
  id: '003'
  name: Build the WASM SIMD double kernel for auto-vectorized contact math
- acceptance:
  - Dreamer can invoke the WASM kernel through a single stable adapter that owns module
    loading, buffer reuse, worker/runtime lifecycle, and error propagation
  - Input and output transfer uses typed double buffers with zero-copy or single-copy
    behavior verified by design, and no object-per-element marshalling in the hot
    path
  - A defined fallback path exists for unsupported runtimes or kernel faults without
    changing the external Dreamer orchestration contract
  dependencies:
  - '001'
  - '002'
  - '003'
  description: Implement the actual integration layer that loads the module, allocates
    and reuses shared/preallocated buffers, marshals state into the binary contract,
    invokes kernels, retrieves results, and handles lifecycle concerns. This story
    is about making the integration solid, not merely callable.
  id: '004'
  name: Create the production integration adapter between Dreamer and WASM
- acceptance:
  - The targeted Dreamer execution path consumes the WASM-backed results end to end
    without bypassing the adapter for the promoted computations
  - State updates, rolling windows, and batched feature production remain consistent
    across repeated ticks/runs with the new integration
  - Feature flags or rollout controls allow the promoted WASM path to be enabled,
    verified, and reverted cleanly
  dependencies:
  - '004'
  description: Replace the existing precision-sensitive computation path with the
    new adapter inside the real Dreamer flow. Wire batching, scheduling, history/ring-buffer
    updates, and result consumption so the WASM path is the delivered path rather
    than an isolated module.
  id: '005'
  name: Integrate the kernel into the end-to-end Dreamer execution path
- acceptance:
  - "End-to-end tests verify exact or policy-defined-equal roundtrips across JS\u2194\
    WASM\u2194JSON boundaries with no silent precision loss"
  - Integration tests prove the Dreamer pipeline uses the WASM path under normal operation
    and falls back correctly under fault or capability checks
  - Benchmark and regression gates confirm the promoted path meets agreed latency/throughput
    goals and maintains portability across target engines
  dependencies:
  - '005'
  description: Establish final release criteria proving that the integrated path preserves
    64-bit fidelity, keeps contact math inside the double-vector kernel, and delivers
    the intended SIMD-oriented speedup without regressions across supported runtimes.
  id: '006'
  name: Gate delivery with fidelity, integration, and performance verification
task: "\u2699\uFE0F  /fanout critique there was a fanout glitch we have fixed, you\
