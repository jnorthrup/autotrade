stories:
- acceptance:
  - xtrade/pom.xml exists with xchange-core, xchange-kraken, and logging dependencies
  - mvn compile succeeds inside xtrade/
  - A com.xtrade.Main class exists and prints a startup banner
  - Unit test skeleton compiles and passes via mvn test
  dependencies: []
  description: Create the Maven project at $CWD/xtrade/ with proper directory structure
    (src/main/java, src/main/resources, src/test/java), a pom.xml pulling in knowm/XChange
    core and XChange-kraken modules (4.4.x), SLF4J/Logback for logging, and a minimal
    'Hello XChange' main class that verifies the KrakenExchange class can be loaded.
  id: '001'
  name: Maven Project Scaffolding and XChange Dependencies
- acceptance:
  - ' AppConfig class reads KRAKEN_API_KEY, KRAKEN_API_SECRET, KRAKEN_MODE from env
    with clear error messages if missing'
  - 'TradingPair enum or constant list defines 5 pairs: BTC/USD, ETH/USD, XRP/USD,
    SOL/USD, ADA/USD'
  - application.properties contains poll-interval-seconds and initial-virtual-balance
    defaults
  - Unit tests verify config loading with mocked environment variables
  dependencies:
  - '001'
  description: Build a configuration layer that reads KRAKEN_API_KEY and KRAKEN_API_SECRET
    (and optional KRAKEN_MODE=sandbox|live) from environment variables, validates
    they are present, and exposes them as an immutable config object. Also define
    the 5 major trading pairs (BTC/USD, ETH/USD, XRP/USD, SOL/USD, ADA/USD) as an
    enum or constant list. Add application.properties for tuneable params like poll-interval-seconds
    and initial-virtual-balance.
  id: '002'
  name: Configuration Module with Kraken Environment Variables
- acceptance:
  - ExchangeService class connects to Kraken using XChange with credentials from AppConfig
  - getCurrentTicker(CurrencyPair) returns a Ticker with last price, bid, ask, volume
  - getOrderBook(CurrencyPair, depth) returns bids and asks
  - All 5 pairs can be queried without exceptions in sandbox/live-read mode
  - Basic retry logic handles transient network errors
  dependencies:
  - '002'
  description: Implement a service that instantiates the XChange KrakenExchange, applies
    API credentials from the config module, and provides methods to fetch current
    ticker prices and order-book depth for each of the 5 trading pairs. Handle rate-limit
    awareness and basic retry/error handling. This uses Kraken's public endpoints
    (no trades yet).
  id: '003'
  name: Kraken Exchange Connection and Market Data Service
- acceptance:
  - PaperTradingEngine maintains virtual USD and coin balances for all 5 pairs
  - submitMarketOrder(pair, side, amount) executes against current ticker price and
    updates balances
  - Trade history is recorded with timestamp, pair, side, price, amount, fee
  - Portfolio state (balances + open orders) is persisted to data/portfolio.json on
    each trade
  - Engine loads prior state from file on startup if it exists
  - Unit tests verify buy, sell, insufficient-funds rejection, and P&L calculation
  dependencies:
  - '003'
  description: 'Build the core paper trading engine: an in-memory virtual portfolio
    starting with a configurable USD balance, order submission (market buy/sell),
    order tracking, trade execution against live ticker prices, and portfolio state
    queries (balances, open positions, P&L). Persist state to a JSON file so it survives
    restarts.'
  id: '004'
  name: Paper Trading Engine - Virtual Portfolio and Order Management
- acceptance:
  - TradingStrategy interface defined with method evaluate(tickers) -> List<Signal>
  - Concrete strategy implementation (e.g., MovingAverageCrossoverStrategy) with configurable
    parameters
  - Strategy produces BUY, SELL, or HOLD signals per pair based on recent price history
  - Price history buffer maintained per pair (last N ticks)
  - Unit tests with canned price data produce expected signals
  dependencies:
  - '003'
  description: Implement a configurable automated trading strategy (e.g., simple mean-reversion
    or moving-average crossover) that consumes ticker data and emits buy/sell signals.
    The strategy should be parameterized (lookback window, threshold percentages)
    and decoupled from execution so it can be swapped later.
  id: '005'
  name: Automated Trading Strategy Implementation
- acceptance:
  - Main class bootstraps AppConfig, ExchangeService, PaperTradingEngine, and TradingStrategy
  - ScheduledExecutorService runs the trading loop at poll-interval-seconds
  - 'Each tick: fetch prices, evaluate strategy, execute resulting signals, log trades'
  - Console output shows timestamped actions and portfolio summary every cycle
  - SIGINT / graceful shutdown persists final state and logs shutdown message
  - App runs via mvn exec:java -Dexec.mainClass=com.xtrade.Main for at least 10 cycles
    without error
  dependencies:
  - '004'
  - '005'
  description: 'Wire everything into a main application loop: a scheduled executor
    polls market data at the configured interval, feeds it to the strategy, routes
    signals to the paper trading engine, logs every action, and prints a portfolio
    summary. Add graceful shutdown (persist state, close exchange). The app should
    be runnable via mvn exec:java or java -jar.'
  id: '006'
  name: Scheduler, Main Loop, and Application Wiring
- acceptance:
  - 'PortfolioReportPrinter outputs formatted table: pair, qty, avg cost, current
    price, unrealized P&L, total P&L'
  - logback.xml configures both console and rolling file appender to logs/xtrade.log
  - 'README.md covers: prerequisites, environment variable setup, build commands,
    sample output screenshot/description'
  - .env.example lists KRAKEN_API_KEY, KRAKEN_API_SECRET, KRAKEN_MODE with placeholder
    values
  - mvn package produces a runnable fat JAR in target/
  dependencies:
  - '006'
  description: Add a summary report printer (console table of portfolio balances,
    unrealized P&L per pair, total return). Harden logging with structured Logback
    output (file + console appenders). Write a README.md with setup instructions (env
    vars, mvn commands, how to interpret output). Add a .env.example file.
  id: '007'
  name: Reporting, Logging Hardening, and README
