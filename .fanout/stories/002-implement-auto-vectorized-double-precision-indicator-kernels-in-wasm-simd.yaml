acceptance:
- Kernels compile to WASM with verified SIMD instruction emission (wasm-objdump or
  equivalent)
- Bit-identical results vs a reference double-precision implementation for all indicator
  functions
- Benchmark showing compute kernels dominate execution time over orchestration overhead
- No dynamic allocation or branching in inner loop paths
- All kernels operate on contiguous Float64Array-backed linear memory
dependencies:
- '001'
description: 'Write the core numeric kernels (rolling-window transforms: SMA, EMA,
  ATR, RSI, MACD, and per-bar fitness math) in portable WASM with explicit f64 vector
  operations. Ensure 2 degrees of contact precision and strict IEEE-754 fidelity throughout.
  Use tight monomorphic loop shapes over contiguous memory that enable WASM SIMD auto-vectorization.
  No dynamic objects, no branches in inner loops, no mixed types. Target the 80/20
  split where 80% of effort is compute-kernel correctness and SIMD vectorization,
  not orchestration.'
id: '002'
name: Implement auto-vectorized double-precision indicator kernels in WASM SIMD
