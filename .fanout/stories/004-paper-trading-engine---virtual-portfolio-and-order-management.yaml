acceptance:
- PaperTradingEngine maintains virtual USD and coin balances for all 5 pairs
- submitMarketOrder(pair, side, amount) executes against current ticker price and
  updates balances
- Trade history is recorded with timestamp, pair, side, price, amount, fee
- Portfolio state (balances + open orders) is persisted to data/portfolio.json on
  each trade
- Engine loads prior state from file on startup if it exists
- Unit tests verify buy, sell, insufficient-funds rejection, and P&L calculation
dependencies:
- '003'
description: 'Build the core paper trading engine: an in-memory virtual portfolio
  starting with a configurable USD balance, order submission (market buy/sell), order
  tracking, trade execution against live ticker prices, and portfolio state queries
  (balances, open positions, P&L). Persist state to a JSON file so it survives restarts.'
id: '004'
name: Paper Trading Engine - Virtual Portfolio and Order Management
