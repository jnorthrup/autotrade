acceptance:
- Memory layout is documented for all input, output, and scratch buffers using structure-of-arrays
  and double-width storage
- JSON serialization/deserialization rules preserve exact 64-bit values for all supported
  payloads, including edge cases such as NaN payload policy, infinities, signed zero,
  and extremal doubles
- The contract states where binary transport is mandatory versus where JSON is allowed,
  with no ambiguous precision downgrade points
dependencies:
- '001'
description: Design the low-level contract for double-precision data across the WASM
  boundary and any JSON-facing boundary. Cover contiguous Float64 layouts, vector
  lane alignment, ring/scratch buffers, and a JSON representation that preserves full
  64-bit fidelity without relying on lossy JS numeric formatting.
id: '002'
name: Specify the f64 memory model and lossless wire contract
