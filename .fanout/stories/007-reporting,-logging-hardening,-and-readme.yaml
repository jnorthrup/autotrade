acceptance:
- 'PortfolioReportPrinter outputs formatted table: pair, qty, avg cost, current price,
  unrealized P&L, total P&L'
- logback.xml configures both console and rolling file appender to logs/xtrade.log
- 'README.md covers: prerequisites, environment variable setup, build commands, sample
  output screenshot/description'
- .env.example lists KRAKEN_API_KEY, KRAKEN_API_SECRET, KRAKEN_MODE with placeholder
  values
- mvn package produces a runnable fat JAR in target/
dependencies:
- '006'
description: Add a summary report printer (console table of portfolio balances, unrealized
  P&L per pair, total return). Harden logging with structured Logback output (file
  + console appenders). Write a README.md with setup instructions (env vars, mvn commands,
  how to interpret output). Add a .env.example file.
id: '007'
name: Reporting, Logging Hardening, and README
