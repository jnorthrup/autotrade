acceptance:
- "Roundtrip fidelity tests pass for all double-range values including subnormals,\
  \ \xB1Infinity, NaN payloads, and denormals"
- "No silent precision loss detected by bit-exact comparison after serialize\u2192\
  deserialize"
- Endianness correctness verified on little-endian and big-endian targets
- Serialization throughput benchmarked and meets real-time tick-processing constraints
- Checksum or hash-based integrity validation integrated
dependencies:
