acceptance:
- TradingStrategy interface defined with method evaluate(tickers) -> List<Signal>
- Concrete strategy implementation (e.g., MovingAverageCrossoverStrategy) with configurable
  parameters
- Strategy produces BUY, SELL, or HOLD signals per pair based on recent price history
- Price history buffer maintained per pair (last N ticks)
- Unit tests with canned price data produce expected signals
dependencies:
- '003'
description: Implement a configurable automated trading strategy (e.g., simple mean-reversion
  or moving-average crossover) that consumes ticker data and emits buy/sell signals.
  The strategy should be parameterized (lookback window, threshold percentages) and
  decoupled from execution so it can be swapped later.
id: '005'
name: Automated Trading Strategy Implementation
