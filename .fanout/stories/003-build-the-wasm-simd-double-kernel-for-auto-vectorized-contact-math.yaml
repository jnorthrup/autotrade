acceptance:
- Core kernels compile to WebAssembly with SIMD enabled and operate entirely on double-precision
  buffers in the hot path
- Reference tests confirm deterministic IEEE-754-conformant results against a scalar
  double baseline for the targeted transforms
- The kernel interface matches the agreed memory contract exactly, with no JS-side
  reshaping required inside compute loops
dependencies:
- '002'
description: Implement the precision kernel as a dedicated WASM module whose hot loops
  operate on f64 vectors and keep the two degrees of contact inside the native numeric
  path. The kernel must be structured for SIMD-friendly compilation and deterministic
  double-precision behavior.
id: '003'
name: Build the WASM SIMD double kernel for auto-vectorized contact math
