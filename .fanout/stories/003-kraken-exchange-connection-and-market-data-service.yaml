acceptance:
- ExchangeService class connects to Kraken using XChange with credentials from AppConfig
- getCurrentTicker(CurrencyPair) returns a Ticker with last price, bid, ask, volume
- getOrderBook(CurrencyPair, depth) returns bids and asks
- All 5 pairs can be queried without exceptions in sandbox/live-read mode
- Basic retry logic handles transient network errors
dependencies:
- '002'
description: Implement a service that instantiates the XChange KrakenExchange, applies
  API credentials from the config module, and provides methods to fetch current ticker
  prices and order-book depth for each of the 5 trading pairs. Handle rate-limit awareness
  and basic retry/error handling. This uses Kraken's public endpoints (no trades yet).
id: '003'
name: Kraken Exchange Connection and Market Data Service
