# xtrade Application Configuration
# ================================

# Polling interval for market-data fetches (seconds)
poll-interval-seconds=60

# Starting virtual balance for paper-trading mode
initial-virtual-balance=10000.00

# Binance kline pipeline defaults
binance.vision.base-url=https://data.binance.vision
binance.api.base-url=https://api.binance.com
binance.kline.start-year=2017
binance.kline.rate-limit-millis=250
xtrade.kline.cache-root=~/xtrade-data/cache
xtrade.kline.import-root=~/xtrade-data/import
