version: "3.8"

services:
  # Data Ingestion Service - WebSocket + REST polling for live candles
  data-ingestion:
    build: .
    command: python3 -u data_ingestion.py
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - DB_PATH=/app/data/candles.duckdb
      - COINBASE_API_KEY=${COINBASE_API_KEY}
      - COINBASE_API_SECRET=${COINBASE_API_SECRET}
      - DEFAULT_GRANULARITY=300
      - USE_WS_ONLY=true
      - LOG_LEVEL=INFO
      - SYNC_INTERVAL=30
    restart: unless-stopped
    networks:
      - hrm-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # Paper Trading Service - Live prediction + signal generation
  paper-trader:
    build: .
    command: python3 -u paper_trader.py
    volumes:
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
      - ./logs:/app/logs
    environment:
      - DB_PATH=/app/data/candles.duckdb
      - BAG_PATH=/app/data/bag.json
      - CHECKPOINT_DIR=/app/checkpoints
      - COINBASE_API_KEY=${COINBASE_API_KEY}
      - COINBASE_API_SECRET=${COINBASE_API_SECRET}
      - MODE=paper
      - POLL_INTERVAL=5
      - LOG_LEVEL=INFO
    depends_on:
      - data-ingestion
    restart: unless-stopped
    networks:
      - hrm-network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # Training Worker 1 - Pretraining with stochastic bags
  training-pretrain:
    build: .
    command: python3 -u training_worker.py --mode pretrain
    volumes:
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
      - ./logs:/app/logs
    environment:
      - DB_PATH=/app/data/candles.duckdb
      - CHECKPOINT_DIR=/app/checkpoints
      - COINBASE_API_KEY=${COINBASE_API_KEY}
      - COINBASE_API_SECRET=${COINBASE_API_SECRET}
      - WORKER_ID=pretrain-1
      - SAVE_EVERY=1000
      - LOG_LEVEL=INFO
      - POLL_INTERVAL=60
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    restart: unless-stopped
    networks:
      - hrm-network
    logging:
      driver: "json-file"
      options:
        max-size: "500m"
        max-file: "3"

  # Training Worker 2 - Fine-tuning on daytrade bag
  training-finetune:
    build: .
    command: python3 -u training_worker.py --mode finetune
    volumes:
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
      - ./logs:/app/logs
    environment:
      - DB_PATH=/app/data/candles.duckdb
      - BAG_PATH=/app/data/bag.json
      - CHECKPOINT_DIR=/app/checkpoints
      - COINBASE_API_KEY=${COINBASE_API_KEY}
      - COINBASE_API_SECRET=${COINBASE_API_SECRET}
      - WORKER_ID=finetune-1
      - SAVE_EVERY=500
      - LOG_LEVEL=INFO
      - POLL_INTERVAL=300
      - LOOKBACK_DAYS=60
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    restart: unless-stopped
    networks:
      - hrm-network
    logging:
      driver: "json-file"
      options:
        max-size: "500m"
        max-file: "3"
    depends_on:
      - data-ingestion

  # Health/Metrics Dashboard (optional - lightweight HTTP status)
  health-monitor:
    build: .
    command: python3 -u health_monitor.py
    volumes:
      - ./data:/app/data:ro
      - ./checkpoints:/app/checkpoints:ro
      - ./logs:/app/logs
    ports:
      - "8001:8000"
    environment:
      - DB_PATH=/app/data/candles.duckdb
      - CHECKPOINT_DIR=/app/checkpoints
      - LOG_DIR=/app/logs
      - PORT=8000
    restart: unless-stopped
    networks:
      - hrm-network

  # Dashboard Showdown - Full training metrics dashboard with drilldown
  dashboard-showdown:
    build: .
    command: python3 -u dashboard_showdown.py
    volumes:
      - ./data:/app/data:ro
      - ./checkpoints:/app/checkpoints:ro
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    environment:
      - DB_PATH=/app/data/candles.duckdb
      - BAG_PATH=/app/data/bag.json
      - CHECKPOINT_DIR=/app/checkpoints
      - LOG_DIR=/app/logs
      - PORT=8000
    restart: unless-stopped
    networks:
      - hrm-network

  # Orchestrator - Manages training jobs and bag rotation
  orchestrator:
    build: .
    command: python3 -u training_orchestrator.py --daemon
    volumes:
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DB_PATH=/app/data/candles.duckdb
      - BAG_PATH=/app/data/bag.json
      - CHECKPOINT_DIR=/app/checkpoints
      - LOG_DIR=/app/logs
    restart: unless-stopped
    networks:
      - hrm-network

networks:
  hrm-network:
    driver: bridge

volumes:
  hrm-data:
  hrm-checkpoints:
  hrm-logs:
